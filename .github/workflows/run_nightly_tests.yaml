name: Run Nightly Rabbitmq Pipeline

on:
  push
#  schedule:
#    - cron: '0 2 * * *'

jobs:
  Nightly-Rabbitmq-Pipeline:
    uses: Netcracker/qubership-test-pipelines/.github/workflows/rabbitmq.yaml@feat/rabbit_atp #v1.7.0
    with:
      service_branch: 'main'
      pipeline_branch: 'feat/rabbit_atp' #this value must match the value after '@' in 'uses'
      scope: 'nightly'
    secrets:
      AWS_S3_ACCESS_KEY_ID: ${{secrets.AWS_S3_ACCESS_KEY_ID}}
      AWS_S3_ACCESS_KEY_SECRET: ${{secrets.AWS_S3_ACCESS_KEY_SECRET}}
