name: Run Nightly Rabbitmq Pipeline

on:
  schedule:
    - cron: '0 22 * * *'

jobs:
  Nightly-Rabbitmq-Pipeline:
    uses: Netcracker/qubership-test-pipelines/.github/workflows/rabbitmq.yaml@006f4c99bd9167307208d09252aa005208a4af0d # v1.13.2
    with:
      service_branch: 'main'
      pipeline_branch: '006f4c99bd9167307208d09252aa005208a4af0d' #this value must match the value after '@' in 'uses'
      scope: 'nightly'
      allure: true
    secrets:
      AWS_S3_ACCESS_KEY_ID: ${{secrets.AWS_S3_ACCESS_KEY_ID}}
      AWS_S3_ACCESS_KEY_SECRET: ${{secrets.AWS_S3_ACCESS_KEY_SECRET}}
