name: Run Nightly Rabbitmq Pipeline

on:
  schedule:
    - cron: '0 2 * * *'

jobs:
  Nightly-Rabbitmq-Pipeline:
    uses: Netcracker/qubership-test-pipelines/.github/workflows/rabbitmq.yaml@5e867049c9bc60651f53611cdcf167dc0c7f8ff4 #v1.7.0
    with:
      service_branch: 'main'
      pipeline_branch: '5e867049c9bc60651f53611cdcf167dc0c7f8ff4' #this value must match the value after '@' in 'uses'
      scope: 'nightly'
    secrets:
      AWS_S3_ACCESS_KEY_ID: ${{secrets.AWS_S3_ACCESS_KEY_ID}}
      AWS_S3_ACCESS_KEY_SECRET: ${{secrets.AWS_S3_ACCESS_KEY_SECRET}}
