name: Run Nightly Rabbitmq Pipeline

on:
  schedule:
    - cron: '0 22 * * *'

jobs:
  Nightly-Rabbitmq-Pipeline:
    uses: Netcracker/qubership-test-pipelines/.github/workflows/rabbitmq.yaml@9fcb2de51b4d510b52ffca883515bdb388cbc16f # v1.14.0
    with:
      service_branch: 'main'
      pipeline_branch: '9fcb2de51b4d510b52ffca883515bdb388cbc16f' # v1.14.0 renovate: depName=Netcracker/qubership-test-pipelines
      scope: 'nightly'
      allure: true
      verify_timeout_minutes: 30
    secrets:
      AWS_S3_ACCESS_KEY_ID: ${{secrets.AWS_S3_ACCESS_KEY_ID}}
      AWS_S3_ACCESS_KEY_SECRET: ${{secrets.AWS_S3_ACCESS_KEY_SECRET}}
